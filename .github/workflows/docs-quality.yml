name: Docs Quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality.yml'
      - '.markdownlint.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g markdownlint-cli
      - run: markdownlint "**/*.md" --ignore node_modules --config .markdownlint.json

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --exclude-mail
            --accept 200,206,429
            --exclude "http://localhost"
            --exclude "REPLACE_ME"
            --exclude "\.a\.run\.app"
            --exclude "host\.docker\.internal"
            "**/*.md"
          fail: true
